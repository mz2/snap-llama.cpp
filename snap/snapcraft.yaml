name: llama-cpp
base: core26
build-base: devel
version: "b9222"
summary: Snap package for llama.cpp - LLM inference in C/C++
description: |
  This snap provides llama.cpp with different backends like HIP (for AMD GPU)
  using snap components.

  Install the HIP backend: `sudo snap install --edge --devmode llama-cpp+hip`
license: MIT
source-code:
  - https://github.com/talhaHavadar/snap-llama.cpp
  - https://github.com/ggml-org/llama.cpp
issues:
  - https://github.com/talhaHavadar/snap-llama.cpp/issues/new/choose
icon: snap/gui/icon.png
platforms:
  amd64:
    build-on:
      - amd64
    build-for:
      - amd64
  arm64:
    build-on:
      - arm64
    build-for:
      - arm64
grade: devel
confinement: devmode
environment:
  # Set path to snap components
  SNAP_COMPONENTS: /snap/$SNAP_INSTANCE_NAME/components/$SNAP_REVISION
  # To find shared libraries that are staged and moved to components
  ARCH_TRIPLET: $CRAFT_ARCH_TRIPLET_BUILD_FOR
components:
  hip:
    type: standard
    summary: llama.cpp with HIP backend
    description: Optimized for inference on AMD GPUs
apps:
  llama-cpp:
    command: bin/cli-wrapper
    plugs:
      - home
parts:
  cli:
    plugin: dump
    source: .
    stage:
      - bin/cli-wrapper
    organize:
      cli.sh: bin/cli-wrapper
  component-local-files:
    plugin: dump
    source: components
    organize:
      "hip": (component/hip)
  llama-cpp-hip:
    source: https://github.com/ggml-org/llama.cpp.git
    source-tag: b9222
    source-depth: 1
    build-packages:
      - rocm-cmake
      - hipcc
      - libhipblas-dev
      - librocblas-dev
      - libcurl4-openssl-dev
    stage-packages:
      - libcurl4t64
      - libssl3t64
      - libgomp1
      - libhipblas3
      - librocblas5
    plugin: cmake
    override-build: |
      export HIPCXX="$(hipconfig -l)/clang"
      export HIP_PATH="$(hipconfig -R)"
      craftctl default
    cmake-parameters:
      - -DGGML_HIP=ON
      - -DGPU_TARGETS='gfx90a;gfx942;gfx1030;gfx1100;gfx1151;gfx11-generic;gfx1200;gfx1201'
      - -DCMAKE_BUILD_TYPE=Release
      # - -DGGML_HIP_ROCWMMA_FATTN=ON # needs rocwmma-dev package
    organize:
      # move everything, including the staged packages
      "*": (component/hip)
